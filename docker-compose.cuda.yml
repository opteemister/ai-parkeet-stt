services:
  parakeet:
    build:
      context: .
      args:
        RUNTIME: cuda
    container_name: parakeet-stt
    ports:
      - "8000:8000"
    environment:
      - PROVIDER=cuda
      - PARAKEET_QUANTIZATION=fp16  # fp16 is faster than int8 on GPU
      - HF_HOME=/models
    volumes:
      - ./models:/models
    networks:
      - domis_network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  domis_network:
    external: true
    name: domis_network
